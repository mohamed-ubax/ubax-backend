# ===================================================================
# UBAX Platform – CI/CD : Build & Push Docker Hub
# ===================================================================
#
# Déclencheurs :
#   • push sur develop → image taguée :develop
#   • push sur main    → image taguée :latest + :main + :v{sha}
#
# Prérequis GitHub Secrets (Settings → Secrets → Actions) :
#   DOCKER_HUB_USERNAME  → spirittechrevolution
#   DOCKER_HUB_TOKEN     → dckr_pat_xxxx (access token Docker Hub)
# ===================================================================

name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docker/**'
      - '.gitignore'

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ─── 1. Checkout du code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup JDK 21 avec cache Maven ────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ─── 3. Build Maven (sans tests – exécutés séparément en CI) ─
      - name: Build with Maven
        run: ./mvnw package -DskipTests -B --no-transfer-progress

      # ─── 4. Setup Docker Buildx (multi-arch, cache) ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 5. Login Docker Hub ──────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ─── 6. Calcul des métadonnées & tags ─────────────────────────
      #   develop → spirittechrevolution/ubax-platform:develop
      #   main    → spirittechrevolution/ubax-platform:latest
      #             spirittechrevolution/ubax-platform:main
      #             spirittechrevolution/ubax-platform:sha-{short}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: spirittechrevolution/ubax-platform
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      # ─── 7. Build & Push multi-arch (amd64 + arm64) ──────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
