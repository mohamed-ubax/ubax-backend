# ===================================================================
# UBAX Platform – CD : Deploy → Health Check
# ===================================================================
#
# Déclenché automatiquement après la réussite de "CI – Build & Push"
#
# Secrets requis :
#   VPS_SSH_PRIVATE_KEY  · VPS_HOST  · VPS_USER
#   DOCKER_HUB_USERNAME  · DOCKER_HUB_TOKEN
# ===================================================================

name: CD – Deploy to VPS

on:
  workflow_run:
    workflows: ["CI – Build & Push"]
    types:
      - completed
    branches:
      - main
      - develop

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – Deploy to VPS
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Stage 3 – Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Resolve deploy tag
        id: tag
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 180s
          script: |
            set -e
            cd /opt/ubax

            TAG="${{ steps.tag.outputs.value }}"
            echo "==> Déploiement tag : $TAG"

            # Mise à jour du tag dans .env
            sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$TAG/" .env

            # Connexion Docker Hub
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Pull + restart backend uniquement (zéro downtime sur autres services)
            docker compose -f docker-compose.vps.yml pull backend
            docker compose -f docker-compose.vps.yml up -d --no-deps --remove-orphans backend

            # Nettoyage des anciennes images
            docker image prune -f

            echo "==> Déploiement terminé ✓"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4 – Health Check post-déploiement
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: 🏥 Stage 4 – Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for backend to start
        run: sleep 30

      - name: Check /api/actuator/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.VPS_HOST }}/api/actuator/health)

          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi

          echo "✅ Backend healthy"

      - name: Print health details
        if: always()
        run: |
          curl -sf http://${{ secrets.VPS_HOST }}/api/actuator/health | \
            python3 -m json.tool || true
