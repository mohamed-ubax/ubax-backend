# ===================================================================
# UBAX Platform – CI : Compile → Test → Build → Push Docker Hub
# ===================================================================
#
# Branches :
#   develop → image :develop
#   main    → image :latest + :main + :sha-{short}
#
# Secrets requis :
#   DOCKER_HUB_USERNAME  · DOCKER_HUB_TOKEN
# ===================================================================

name: CI – Build & Push

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docker/**'
      - '.gitignore'

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 0 – Google Java Format Check
  # ═══════════════════════════════════════════════════════════════
  format-check:
    name: 📝 Stage 0 – Google Java Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check Google Java Format
        run: |
          chmod +x mvnw
          ./mvnw fmt:check -B --no-transfer-progress

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1 – Compile & Test
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Stage 1 – Compile & Test
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile & run unit tests
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2 – Build & Push Docker Hub
  # ═══════════════════════════════════════════════════════════════
  build-push:
    name: 🐳 Stage 2 – Build & Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package (skip tests – déjà exécutés)
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ubaxproject/ubax-hub
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – Deploy to VPS
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Stage 3 – Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 180s
          script: |
            set -e
            cd /opt/ubax

            TAG="${{ needs.build-push.outputs.image-tag }}"
            echo "==> Déploiement tag : $TAG"

            # Mise à jour du tag dans .env
            sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$TAG/" .env

            # Connexion Docker Hub
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Pull + restart backend uniquement
            docker compose -f docker-compose.vps.yml pull backend
            docker compose -f docker-compose.vps.yml up -d --no-deps --remove-orphans backend

            # Nettoyage des anciennes images
            docker image prune -f

            echo "==> Déploiement terminé ✓"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4 – Health Check post-déploiement
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: 🏥 Stage 4 – Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for backend to start
        run: sleep 30

      - name: Check /api/actuator/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.VPS_HOST }}/api/actuator/health)

          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi

          echo "✅ Backend healthy"

      - name: Print health details
        if: always()
        run: |
          curl -sf http://${{ secrets.VPS_HOST }}/api/actuator/health | \
            python3 -m json.tool || true
