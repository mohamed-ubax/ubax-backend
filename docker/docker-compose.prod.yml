# ===================================================================
# UBAX Platform – Infrastructure Docker (PRODUCTION – VPS)
# ===================================================================
#
# Services             | Port hôte  | Accès
# ———————————————————— | ————————— | ————————————————————————————————
# Nginx (reverse proxy)| 80         | http://<VPS_IP>
# Backend API          | (interne)  | http://<VPS_IP>/api
# Frontend Admin       | (interne)  | http://<VPS_IP>/admin/
# Frontend Portail     | (interne)  | http://<VPS_IP>/
# Keycloak             | (interne)  | http://<VPS_IP>/auth
# MinIO Console        | 9001       | http://<VPS_IP>:9001
# Dozzle (logs)        | 8888       | http://<VPS_IP>:8888
#
# Images Docker Hub :
#   ubaxproject/ubax-hub       → Backend Spring Boot
#   ubaxproject/ubax-admin     → Frontend Admin Angular
#   ubaxproject/ubax-portail   → Frontend Portail Angular
#
# Prérequis VPS :
#   mkdir -p /opt/ubax/{nginx,postgres}
#   cp docker-compose.prod.yml /opt/ubax/
#   cp .env.prod              /opt/ubax/.env
#   cp nginx/nginx.conf       /opt/ubax/nginx/
#   cp postgres/init-db.sh    /opt/ubax/postgres/
#
# Démarrage : cd /opt/ubax && docker compose -f docker-compose.prod.yml up -d
# ===================================================================

services:

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL 17 – Serveur unique, 3 bases de données
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ubax-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    # Pas d'exposition de port hôte en production — accès interne uniquement
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # MinIO – Object Storage S3-compatible
  # ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ubax-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # Console MinIO accessible directement
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # MinIO Init – Création des buckets (exécution unique)
  # ─────────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ubax-minio-init-prod
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set ubax http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}

        mc mb --ignore-existing ubax/users-avatars
        mc mb --ignore-existing ubax/agencies-logos
        mc mb --ignore-existing ubax/properties-media
        mc mb --ignore-existing ubax/property-documents
        mc mb --ignore-existing ubax/tenant-documents
        mc mb --ignore-existing ubax/documents-generated
        mc mb --ignore-existing ubax/ticket-attachments

        mc anonymous set download ubax/users-avatars
        mc anonymous set download ubax/agencies-logos
        mc anonymous set download ubax/properties-media

        echo "Buckets MinIO initialises avec succes"
    networks:
      - ubax-net

  # ─────────────────────────────────────────────────────────────────
  # Keycloak 26 – IAM / OAuth2 / OIDC
  #   Mode : start (production)
  #   ⚠️  HTTP activé car pas encore de TLS sur le VPS
  #       Ajouter Certbot + HTTPS quand un domaine sera configuré
  # ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.5
    container_name: ubax-keycloak-prod
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: warn
    networks:
      - ubax-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─────────────────────────────────────────────────────────────────
  # Backend Spring Boot – image Docker Hub (ubaxproject/ubax-hub)
  # ─────────────────────────────────────────────────────────────────
  backend:
    image: ubaxproject/ubax-hub:${BACKEND_TAG:-latest}
    container_name: ubax-backend-prod
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SERVER_SERVLET_CONTEXT_PATH: /api
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ubax-net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Frontend Admin – Angular (image Docker Hub)
  #   Profil : frontend (non démarré par défaut – image pas encore publiée)
  #   Activer : docker compose --profile frontend up -d
  # ─────────────────────────────────────────────────────────────────
  frontend-admin:
    profiles:
      - frontend
    image: ubaxproject/ubax-admin:${ADMIN_TAG:-latest}
    container_name: ubax-frontend-admin-prod
    restart: unless-stopped
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────
  # Frontend Portail – Angular (image Docker Hub)
  #   Profil : frontend (non démarré par défaut – image pas encore publiée)
  #   Activer : docker compose --profile frontend up -d
  # ─────────────────────────────────────────────────────────────────
  frontend-portail:
    profiles:
      - frontend
    image: ubaxproject/ubax-portail:${PORTAIL_TAG:-latest}
    container_name: ubax-frontend-portail-prod
    restart: unless-stopped
    networks:
      - ubax-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────
  # Nginx – Reverse proxy (API + Keycloak + Frontends)
  # ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ubax-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # À activer quand le domaine + SSL seront configurés
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ubax-net
    depends_on:
      - backend
      - keycloak

  # ─────────────────────────────────────────────────────────────────
  # Dozzle – Logs en temps réel
  # ─────────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: ubax-dozzle-prod
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 500
    networks:
      - ubax-net

# ─── Volumes persistants ──────────────────────────────────────────
volumes:
  postgres_data:
    name: ubax-postgres-prod-data
  minio_data:
    name: ubax-minio-prod-data

# ─── Réseau interne ───────────────────────────────────────────────
networks:
  ubax-net:
    name: ubax-prod-net
    driver: bridge
