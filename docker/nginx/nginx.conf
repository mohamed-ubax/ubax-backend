# ===================================================================
# Nginx – Reverse Proxy UBAX Platform (Production)
# ===================================================================
#
# Routage :
#   /api/*    → backend:8080          (Spring Boot)
#   /auth/*   → keycloak:8080         (Keycloak IAM)
#   /admin/*  → frontend-admin:80     (Angular Admin – image Docker Hub)
#   /*        → frontend-portail:80   (Angular Portail – image Docker Hub)
# ===================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ─── Compression gzip pour les assets statiques ───────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ─── Upstream services ────────────────────────────────────────
    upstream backend {
        server backend:8080;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    upstream frontend_admin {
        server frontend-admin:80;
    }

    upstream frontend_portail {
        server frontend-portail:80;
    }

    # ─── Serveur principal ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Taille max des uploads (documents, fichiers)
        client_max_body_size 50M;

        # ── Backend API Spring Boot ───────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Keycloak IAM ─────────────────────────────────────────
        location /auth/ {
            proxy_pass         http://keycloak/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }

        # ── Frontend Admin – décommentez quand l'image Docker Hub est publiée ──
        # location /admin/ {
        #     proxy_pass         http://frontend_admin/;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Host              $host;
        #     proxy_set_header   X-Real-IP         $remote_addr;
        #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        #     proxy_set_header   X-Forwarded-Proto $scheme;
        #     proxy_intercept_errors on;
        #     error_page 404 = /admin/index.html;
        # }

        # ── Frontend Portail – décommentez quand l'image Docker Hub est publiée ──
        # location / {
        #     proxy_pass         http://frontend_portail/;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Host              $host;
        #     proxy_set_header   X-Real-IP         $remote_addr;
        #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        #     proxy_set_header   X-Forwarded-Proto $scheme;
        #     proxy_intercept_errors on;
        #     error_page 404 = /index.html;
        # }

        # ── Page d'attente (frontends pas encore déployés) ───────────
        location / {
            return 200 '<html><body style="font-family:sans-serif;text-align:center;padding:4rem"><h1>UBAX Platform</h1><p>API: <a href="/api/actuator/health">/api/actuator/health</a></p><p>Auth: <a href="/auth/">/auth/</a></p></body></html>';
            add_header Content-Type text/html;
        }

        # ── Health check nginx ────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
